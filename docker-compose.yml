# AI Kids Creator Academy — Docker Compose
# Database = Supabase (set DATABASE_URL in apps/api/.env).
#
#   docker compose up --build
#   API  http://localhost:4000
#   Web  http://localhost:8080
#   Redis http://localhost:6379
#
# Daily development (recommended):
#   docker compose up redis -d      # start Redis only
#   npm run dev:api
#   npm run dev:web

services:
  redis:
    image: redis:7-alpine
    container_name: aikids-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Do NOT quote the empty string here — YAML would pass literal "" chars.
        # Empty = FE uses relative /api paths; nginx.conf proxies to api container.
        VITE_API_URL:
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  redis_data:
