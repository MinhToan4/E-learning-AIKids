# Optional production-like deploy: API + Web only.
# Database = Supabase (set DATABASE_URL in apps/api/.env).
# No local Postgres container — you already use cloud SQL.
#
#   docker compose up --build
#   API  http://localhost:4000
#   Web  http://localhost:8080
#
# Daily development (recommended):
#   npm run dev:api
#   npm run dev:web

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - '8080:80'
    depends_on:
      - api
