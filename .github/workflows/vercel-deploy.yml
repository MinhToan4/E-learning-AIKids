name: Deploy Vercel

on:
  push:
    branches:
      - codex/storymee-backend-integration
  workflow_dispatch:
    inputs:
      target:
        description: Deployment environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.event_name == 'push' && 'production' || inputs.target }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_mncewePWk1xbRErV5Dcslw5g
  VERCEL_PROJECT_ID: prj_miO75mZMqVOXPg0A656cxq8lxfuz

jobs:
  deploy-preview:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'preview'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: preview

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull preview settings
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build preview
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy preview
        run: vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"

  deploy-production:
    if: github.event_name == 'push' || inputs.target == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://app.aikid.vn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build production
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
