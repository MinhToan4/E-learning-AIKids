name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/storymee-backend-integration

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm run test -w @aikids/domain -- --maxWorkers=2
          npm run test -w @aikids/web -- --maxWorkers=2

      - name: Build frontend
        run: npm run build
