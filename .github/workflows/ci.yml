name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/storymee-backend-integration

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        shell: bash
        run: |
          set +e
          npm run test -w @aikids/domain -- --maxWorkers=2 2>&1 | tee domain-test.log
          domain_status=${PIPESTATUS[0]}
          npm run test -w @aikids/web -- --maxWorkers=2 2>&1 | tee web-test.log
          web_status=${PIPESTATUS[0]}
          if (( domain_status != 0 || web_status != 0 )); then
            diagnostic="$(cat domain-test.log web-test.log | tail -c 6000 | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Frontend test diagnostics::$diagnostic"
            exit 1
          fi

      - name: Build frontend
        run: npm run build
