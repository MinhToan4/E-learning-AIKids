server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Security Headers (OWASP A05 + CSP) ────────────────────
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # CSP: allow Google Sign-In popup + Google Fonts; block inline scripts except
  # vite-injected chunks (unsafe-inline needed for React hydration in SPA mode)
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' accounts.google.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com https://accounts.google.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' http://localhost:* https:; frame-src accounts.google.com; object-src 'none'; base-uri 'self';" always;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API requests to the Fastify backend
  location /api/ {
    proxy_pass http://api:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Strip sensitive response headers from API before forwarding to browser
    proxy_hide_header X-Powered-By;
  }

  # Cache static assets aggressively (Vite content-hashed filenames)
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    # Assets also need security headers
    add_header X-Content-Type-Options "nosniff" always;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
